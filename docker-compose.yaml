version: "3.9"

services:
  mongodb:
    image: mongo
    container_name: mongodb
    restart: always
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: server
    restart: always
    ports:
      - 5000:5000
    environment:
      - PORT=5000
      - MONGODB_URL=mongodb://mongodb:27017/mydatabase
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: client
    restart: always
    ports:
      - 3000:3000
    environment:
      - VITE_BASE_URL=http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  mongo_data: